};

};

const buildPairs = (groups) => {
  const s = new Set();
  (groups || []).forEach((g) =>

  );
  return s;
};

/* 會員分桌(以「單位」為基礎:新人+導師為不可拆散的 2 人單位,其餘為 1 人單位)
   多次隨機重排,貪婪避開上週同桌,取衝突最少解 */
function groupUnits(units, lastPairs, bondOf) {
  const conflictOf = (table, unit) => {
    let c = 0;
    unit.forEach((p) =>
      table.forEach((q) => {
        if (lastPairs.has(pk(p, q))) c++;
      })
    );
    return c;
  };
  let best = null;
  for (let t = 0; t < 400; t++) {
    const remaining = shuffle(units.map((u) => [...u]));
    const tables = [];
    let conflicts = 0;
    const repeated = [];
    while (remaining.length) {
      const table = [...remaining.shift()];
      while (table.length < 3 && remaining.length) {
        let idx = remaining.findIndex(
          (u) => table.length + u.length <= 3 && conflictOf(table, u) === 0
        );
        if (idx === -1)
          idx = remaining.findIndex((u) => table.length + u.length <= 3);
        if (idx === -1) break; // 剩餘皆為 2 人單位而桌上已有 2 人,本桌 2 人成桌
        const u = remaining.splice(idx, 1)[0];
        const c = conflictOf(table, u);
        if (c > 0) {
          conflicts += c;
          u.forEach((p) =>
            table.forEach((q) => {
              if (lastPairs.has(pk(p, q))) repeated.push([p, q]);
            })
          );
        }
        table.push(...u);
      }
      tables.push(table);
    }
    /* 落單處理:寧可 2+2,不讓 1 人落單(不可拆散新人-導師) */
    const last = tables[tables.length - 1];
    if (last && last.length === 1 && tables.length >= 2) {
      for (const donor of [...tables].reverse()) {
        if (donor === last || donor.length !== 3) continue;
        let di = donor.findIndex(
          (p) => !bondOf.has(p) && !lastPairs.has(pk(p, last[0]))
        );
        if (di === -1) di = donor.findIndex((p) => !bondOf.has(p));
        if (di >= 0) {
          last.push(donor.splice(di, 1)[0]);
          break;
        }
      }
    }
    if (!best || conflicts < best.conflicts) best = { tables, conflicts, repeated };
    if (best.conflicts === 0) break;
  }
  return best || { tables: [], conflicts: 0, repeated: [] };
}

function NameBadges({ data }) {
  const guests = data.guests || [];
  /* 一張 A4 直向 4 列×2 欄=8 張;超過 8 位自動延伸下一張(列印自動分頁) */

  const cards = Array.from({ length: slots }, (_, i) => guests[i] || null);
  const CARD_H = 255;
  return (
    <div style={{ width: A4.shortSide, minHeight: A4.longSide, boxSizing: "border-box", background: "#fff", color: "#000", padding: "26px 20px", fontFamily: KAI, display: "grid", gridTemplateColumns: "1fr 1fr", gridAutoRows: `${CARD_H}px`, gap: "14px 14px" }}>

        <div key={i} style={{ height: CARD_H }}>
          <BadgeCard g={g} />
        </div>
      ))}
    </div>
  );
}

  const [tab, setTab] = useState("week");
  const [confirmArm, setConfirmArm] = useState(false);
  const [msg, setMsg] = useState("");
  const [sel, setSel] = useState(null);
  const [saved, setSaved] = useState([]);
  const [viewing, setViewing] = useState(null);
  const [confirmDlg, setConfirmDlg] = useState(null); // {message, onConfirm}
  const askConfirm = (message, onConfirm) => setConfirmDlg({ message, onConfirm });

  /* 座位圖縮放:電腦版整張不超出畫面寬度(下載時仍以原始尺寸輸出) */
  const mapWrapRef = useRef(null);
  const mapInnerRef = useRef(null);
  const [mapScale, setMapScale] = useState(1);
  const [mapBoxH, setMapBoxH] = useState(null);
  useEffect(() => {
    const fit = () => {
      const wrap = mapWrapRef.current;
      const inner = mapInnerRef.current;
      if (!wrap || !inner) {
        setMapScale(1);
        setMapBoxH(null);
        return;
      }
      const s = Math.min(1, wrap.clientWidth / inner.offsetWidth);
      setMapScale(s);
      setMapBoxH(Math.ceil(inner.offsetHeight * s));
    };
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  });

  /* ---------- 管理員登入(前端門檻:僅防誤用,無法防原始碼檢視) ---------- */
  const [authed, setAuthed] = useState(() => {
    try { return sessionStorage.getItem("gw-auth") === "1"; } catch (e) { return false; }
  });
  const [loginDlg, setLoginDlg] = useState(null); // {next}
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const requireAuth = (next) => {
    if (authed) { next(); return; }
    setLoginUser("");
    setLoginPass("");
    setLoginErr("");
    setLoginDlg({ next });
  };
  const tryLogin = () => {
    if (loginUser.trim() === "admin" && loginPass === "3345678") {
      try { sessionStorage.setItem("gw-auth", "1"); } catch (e) {}
      setAuthed(true);
      const next = loginDlg && loginDlg.next;
      setLoginDlg(null);
      if (next) next();
    } else {
      setLoginErr("帳號或密碼錯誤");
    }
  };
  const logout = () => {
    try { sessionStorage.removeItem("gw-auth"); } catch (e) {}
    setAuthed(false);
    setViewing(null);
    setTab("week");
  };

  /* 載入儲存資料 */
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("gw-roster");
        if (r) {
          const parsed = { ...DEFAULT_ROSTER, ...JSON.parse(r.value) };
          if (!Array.isArray(parsed.committee)) parsed.committee = DEFAULT_ROSTER.committee;
          if (!Array.isArray(parsed.mentorPairs)) parsed.mentorPairs = [];
          if (!Array.isArray(parsed.sound)) parsed.sound = [...DEFAULT_ROSTER.sound];
          while (parsed.sound.length < 3) parsed.sound.push(""); // 電音固定 3 格(可留空)
          const cSet = new Set(parsed.committee.map((s) => (s || "").trim()));
          parsed.members = (parsed.members || []).filter((m) => !cSet.has((m || "").trim())); // 委員為獨立名單
          setRoster(parsed);
        }
      } catch (e) {}
      try {
        const h = await window.storage.get("gw-history");
        if (h) setHistory(JSON.parse(h.value));
      } catch (e) {}
      try {
        const s = await window.storage.get("gw-saved");
        if (s) {
          const list = JSON.parse(s.value);
          if (Array.isArray(list)) setSaved(list);
        }
      } catch (e) {}
      try {
        const w = await window.storage.get("gw-weekly");
        if (w) {
          const parsed = { ...emptyWeekly(), ...JSON.parse(w.value) };
          /* 每週三 10:00 後表單恢復空白:暫存時間早於最近一次週三 10:00 即視為上週資料 */
          if (!parsed.savedAt || parsed.savedAt < lastResetTime()) {
            window.storage.set("gw-weekly", JSON.stringify(emptyWeekly())).catch(() => {});
          } else {
            if (!parsed.agenda || parsed.agenda.length !== 5)
              parsed.agenda = ["", "", "", "", ""];
            parsed.proxies = (parsed.proxies || [])
              .map((p) => (typeof p === "string" ? p : (p && p.forMember) || ""))
              .filter(Boolean);
            parsed.guests = (parsed.guests || []).map((g) => ({
              name: g.name || "",
              committee: g.committee || "",
              angel: g.angel || "",
              industry: g.industry || "",
              phone: g.phone || "",
              email: g.email || "",
              inviter: g.inviter || "",
            }));
            parsed.visitors = Math.max(0, parseInt(parsed.visitors, 10) || 0);
            setWeekly(parsed);
          }
        }
      } catch (e) {}
    })();
  }, []);

  const persist = (key, obj) => {
    try {
      window.storage.set(key, JSON.stringify(obj)).catch(() => {});
    } catch (e) {}
  };
  const updateRoster = (r) => {
    setRoster(r);
    persist("gw-roster", r);
  };

  /* ---------- 產生座位 ---------- */
  const generate = () => {
    const warnings = [];
    /* 輪換名單 = 會員 ∪ 委員(委員為獨立名單),扣除固定席(主席排/電音/大使) */
    const committeeAll = (roster.committee || []).map((s) => s.trim()).filter(Boolean);
    const fixedNames = new Set(
      [
        ...roster.chairRow.map((c) => c.name.trim()),
        ...roster.sound.map((s) => (s || "").trim()),
        ...roster.ambassadors.map((a) => (a || "").trim()),
      ].filter(Boolean)
    );
    const members = [
      ...new Set([...roster.members.map((s) => s.trim()).filter(Boolean), ...committeeAll]),
    ].filter((n) => !fixedNames.has(n));
    const memberSet = new Set(members);
    const absent = new Set(weekly.absent);
    const proxied = new Set(weekly.proxies.filter((m) => memberSet.has(m) && !absent.has(m)));
    const lastPairs = buildPairs(history ? history.groups : []);

    /* 新人-導師綁定:雙方都出席才生效 */
    const attendSet = new Set(members.filter((m) => !absent.has(m) && !proxied.has(m)));
    const bondOf = new Map();
    (roster.mentorPairs || []).forEach((p) => {
      const a = (p.newbie || "").trim();
      const b = (p.mentor || "").trim();
      if (!a || !b || a === b) return;
      if (!attendSet.has(a) || !attendSet.has(b)) {
        if (memberSet.has(a) && memberSet.has(b))
          warnings.push(`新人「${a}」與導師「${b}」有一方本週未出席,綁定本週暫停`);
        return;
      }
      if (bondOf.has(a) || bondOf.has(b)) {
        warnings.push(`「${a}/${b}」與其他綁定重疊,僅保留先設定者`);
        return;
      }
      bondOf.set(a, b);
      bondOf.set(b, a);
    });

    /* 可指派名單(逐步扣除已被指定/指派者) */
    const avail = new Set(attendSet);
    const committeeAttending = () =>
      committeeAll.filter((c) => avail.has(c) && !bondOf.has(c));

    const takeName = (n) => {
      avail.delete(n);
      return n;
    };
    const autoAngel = () => {
      const cSet = new Set(committeeAll);
      let cand = [...avail].filter((m) => !bondOf.has(m) && !cSet.has(m));
      if (!cand.length) cand = [...avail].filter((m) => !bondOf.has(m));
      if (!cand.length) return null;
      return takeName(cand[Math.floor(Math.random() * cand.length)]);
    };

    /* 來賓桌:seats = [小天使(靠螢幕側), 來賓(中間), 委員(離螢幕較遠側)] */
    const lockedTables = [];
    weekly.guests
      .filter((g) => g.name && g.name.trim())
      .forEach((g) => {
        const gName = g.name.trim();
        /* 委員側 */
        let cSeat = null;
        const cPick = (g.committee || "").trim();
        if (cPick) {
          if (!committeeAll.includes(cPick))
            warnings.push(`「${cPick}」不在委員名單(來賓 ${gName}),已自動改派`);
          else if (!avail.has(cPick))
            warnings.push(`委員「${cPick}」本週缺席/代理或已被指派,已自動改派(來賓 ${gName})`);
          else if (bondOf.has(cPick))
            warnings.push(`委員「${cPick}」為新人-導師綁定成員須與搭檔同桌,已自動改派(來賓 ${gName})`);
          else cSeat = { name: takeName(cPick), kind: "committee" };
        }
        if (!cSeat) {
          const cs = committeeAttending();
          if (cs.length) cSeat = { name: takeName(cs[0]), kind: "committee" };
          else {
            const sub = autoAngel();
            if (sub) {
              cSeat = { name: sub, kind: "angel" };
              warnings.push(`委員人數不足,來賓 ${gName} 的委員側由小天使「${sub}」補位`);
            } else {
              cSeat = { name: "(空位)", kind: "committee" };
              warnings.push(`來賓 ${gName} 的委員側無人可派`);
            }
          }
        }
        /* 小天使側 */
        let aSeat = null;
        const aPick = (g.angel || "").trim();
        if (aPick) {
          if (!memberSet.has(aPick))
            warnings.push(`「${aPick}」不在會員名單(來賓 ${gName} 的小天使),已自動改派`);
          else if (!avail.has(aPick))
            warnings.push(`「${aPick}」本週缺席/代理或已被指派,已自動改派(來賓 ${gName})`);
          else if (bondOf.has(aPick))
            warnings.push(`「${aPick}」為新人-導師綁定成員須與搭檔同桌,已自動改派(來賓 ${gName})`);
          else aSeat = { name: takeName(aPick), kind: "angel" };
        }
        if (!aSeat) {
          const sub = autoAngel();
          if (sub) aSeat = { name: sub, kind: "angel" };
          else {
            aSeat = { name: "(空位)", kind: "angel" };
            warnings.push(`來賓 ${gName} 的小天使側無人可派`);
          }
        }
        lockedTables.push({
          seats: [aSeat, { name: gName, kind: "guest" }, cSeat],
          type: "guest",
        });
      });

    let pool = shuffle([...avail]);
    const takeUnbonded = () => {
      const i = pool.findIndex((p) => !bondOf.has(p));
      return i >= 0 ? pool.splice(i, 1)[0] : null;
    };

    /* 大使桌:大使+董顧固定同桌不拆開,第三個位子開放給會員 */
    const ambTable = {
      seats: [
        { name: roster.ambassadors[0] || "大使", kind: "amb" },
        { name: roster.ambassadors[1] || "董顧", kind: "amb" },
      ],
      type: "amb",
    };
    const ambExtra = takeUnbonded();
    if (ambExtra) ambTable.seats.push({ name: ambExtra, kind: "member" });

    /* 代理人桌(綠色=由代理出席的會員名字,固定右側外圍) */
    const proxyTables = [];
    let pr = [...proxied];
    while (pr.length) {
      if (pr.length === 4) {
        proxyTables.push({ seats: pr.splice(0, 2).map((n) => ({ name: n, kind: "proxy" })), type: "proxy" });
        proxyTables.push({ seats: pr.splice(0, 2).map((n) => ({ name: n, kind: "proxy" })), type: "proxy" });
      } else if (pr.length === 1) {
        const one = pr.shift();
        const fill = takeUnbonded();
        if (fill) {
          proxyTables.push({
            seats: [{ name: one, kind: "proxy" }, { name: fill, kind: "member" }],
            type: "proxy",
          });
        } else {
          proxyTables.push({ seats: [{ name: one, kind: "proxy" }], type: "proxy" });
          warnings.push("代理人一人成桌且無會員可遞補,建議手動調整");
        }
      } else {
        proxyTables.push({
          seats: pr.splice(0, Math.min(3, pr.length)).map((n) => ({ name: n, kind: "proxy" })),
          type: "proxy",
        });
      }
    }

    /* 其餘會員分桌(新人-導師為 2 人單位) */
    const used = new Set();
    const units = [];
    pool.forEach((m) => {
      if (used.has(m)) return;
      const partner = bondOf.get(m);
      if (partner && pool.includes(partner) && !used.has(partner)) {
        units.push([m, partner]);
        used.add(m);
        used.add(partner);
      } else {
        units.push([m]);
        used.add(m);
      }
    });
    const grouped = groupUnits(units, lastPairs, bondOf);
    grouped.repeated.slice(0, 8).forEach(([a, b]) =>
      warnings.push(`「${a}」與「${b}」上週已同桌,本週無法完全避開`)
    );
    const memberTables = grouped.tables
      .filter((t) => t.length > 0)
      .map((t) => ({ seats: t.map((n) => ({ name: n, kind: "member" })), type: "member" }));
    if (memberTables.some((t) => t.seats.length === 1))
      warnings.push("仍有 1 人落單(總人數過少),請手動調整");

    /* 分配:底排排數由系統依總桌數自動決定(≤14桌一排、>14桌兩排,再多則兩側自動延伸)
       來賓桌依「視野順序」優先安排:
       ① 底排內圈(正對舞台,視野最佳)② 內圈左右直排(由後往舞台方向)
       ③ 底排第二排 ④ 外圈直排(內圈滿了才排外圈) */
    const regular = [...lockedTables, ...memberTables];
    const totalAll = regular.length + proxyTables.length;
    const bottomCap = totalAll > 14 ? 4 : 2;
    /* 參訪桌數先行計算:參訪可與會員同排,底排(含參訪)最多 3 排(6 桌);
       底排總桌數為奇數時多拉一桌會員桌下來補滿該排,盡量填滿方形 */
    const visitorCount = Math.max(0, parseInt(weekly.visitors, 10) || 0);
    const needVTables = visitorCount > 0 ? Math.ceil(visitorCount / 3) : 0;
    const vTables = Math.min(needVTables, 6);
    if (needVTables > vTables)
      warnings.push(
        `參訪 ${visitorCount} 人超過底排容量(3 排共 18 位),超出 ${visitorCount - 18} 位請現場加椅調整`
      );
    let bottomCount = Math.min(bottomCap, regular.length, 6 - vTables);
    while (
      (bottomCount + vTables) % 2 === 1 &&
      bottomCount + vTables < 6 &&
      bottomCount < regular.length
    )
      bottomCount++;
    const P = proxyTables.length;
    const totalCol = regular.length - bottomCount + P;
    const per = [0, 0, 0, 0];
    for (let i = 0; i < 4; i++) per[i] = Math.floor(totalCol / 4);
    /* 餘數優先補內側(LI/RI)再右外(RO)最後左外(LO):會員可往右邊區塊補空缺,盡量填滿方形 */
    const fillOrder = [1, 2, 3, 0];
    for (let i = 0; i < totalCol % 4; i++) per[fillOrder[i]]++;
    if (per[3] < P) {
      let need = P - per[3];
      per[3] = P;
      let i = 0;
      while (need > 0 && i < 100) {
        const j = i % 3;
        if (per[j] > 0) {
          per[j]--;
          need--;
        }
        i++;
      }
    }

    const slots = {
      LO: Array(per[0]).fill(null),
      LI: Array(per[1]).fill(null),
      RI: Array(per[2]).fill(null),
      RO: Array(per[3]).fill(null),
      bottom: Array(bottomCount).fill(null),
    };
    for (let i = 0; i < P; i++) slots.RO[per[3] - P + i] = proxyTables[i];

    const viewOrder = [];
    for (let i = 0; i < Math.min(2, bottomCount); i++) viewOrder.push(["bottom", i]);
    for (let i = Math.max(per[1], per[2]) - 1; i >= 0; i--) {
      if (i < per[1]) viewOrder.push(["LI", i]);
      if (i < per[2]) viewOrder.push(["RI", i]);
    }
    for (let i = 2; i < bottomCount; i++) viewOrder.push(["bottom", i]);
    const roFree = per[3] - P;
    for (let i = Math.max(per[0], roFree) - 1; i >= 0; i--) {
      if (i < per[0]) viewOrder.push(["LO", i]);
      if (i < roFree) viewOrder.push(["RO", i]);
    }

    let vi = 0;
    lockedTables.forEach((gt) => {
      while (vi < viewOrder.length) {
        const [z, idx] = viewOrder[vi++];
        if (!slots[z][idx]) {
          slots[z][idx] = gt;
          return;
        }
      }
      warnings.push(`來賓「${gt.seats[1].name}」的桌子未能排入,請檢查桌數`);
    });

    const rest = [...memberTables];
    ["LO", "LI", "RI", "RO", "bottom"].forEach((z) => {
      slots[z] = slots[z].map((t) => t || rest.shift()).filter(Boolean);
    });

    /* 三席鐵律:每桌固定 3 個位置、對齊;沒坐滿的以「空位」補足(空位排在桌子下方/外側) */
    const padTable = (t) => {
      while (t.seats.length < 3) t.seats.push({ name: "", kind: "empty" });
    };
    ["LO", "LI", "RI", "RO", "bottom"].forEach((z) => slots[z].forEach(padTable));
    padTable(ambTable);

    /* 空位桌一律移至口字最靠底部的角落:左外側最下,其次右外側最下(代理桌之上) */
    const hasEmpty = (t) => t.type === "member" && t.seats.some((s) => s.kind === "empty");
    const partialPos = [];
    ["LO", "LI", "RI", "RO", "bottom"].forEach((z) => {
      slots[z].forEach((t, i) => {
        if (hasEmpty(t)) partialPos.push([z, i]);
      });
    });
    const cornerTargets = [];
    if (slots.LO.length) cornerTargets.push(["LO", slots.LO.length - 1]);
    for (let i = slots.RO.length - 1; i >= 0; i--) {
      if (slots.RO[i].type !== "proxy") {
        cornerTargets.push(["RO", i]);
        break;
      }
    }
    cornerTargets.forEach(([tz, ti]) => {
      if (!partialPos.length) return;
      const target = slots[tz][ti];
      if (hasEmpty(target)) {
        const k = partialPos.findIndex(([z, i]) => z === tz && i === ti);
        if (k >= 0) partialPos.splice(k, 1);
        return;
      }
      if (target.type !== "member") return;
      const [pz, pi] = partialPos.shift();
      slots[tz][ti] = slots[pz][pi];
      slots[pz][pi] = target;
    });

    /* 委員方位調整:
       直排桌 seats 由上而下,上=靠舞台/螢幕 → 委員(離螢幕遠)在下方(index 2),建桌時已如此。
       底排橫桌 seats 由左而右,離螢幕遠=離中央走道較遠側 → 左半邊的桌委員在左(反轉),右半邊維持在右。 */
    slots.bottom.forEach((t, i) => {
      if (t.type === "guest" && i % 2 === 0) t.seats.reverse();
    });

    /* 分會參訪桌:不記名、附加在底排會員/來賓桌之後(同排可混坐,會員與來賓在內側);
       桌數已於前面與 bottomCount 一併計算 */
    for (let i = 0; i < vTables; i++) {
      const n = Math.max(1, Math.min(3, visitorCount - i * 3));
      slots.bottom.push({
        seats: Array.from({ length: 3 }, (_, x) =>
          x < n ? { name: "參訪", kind: "visitor" } : { name: "", kind: "empty" }
        ),
        type: "visitor",
      });
    }

    const fixedCount =
      roster.chairRow.filter((c) => c.name.trim()).length +
      roster.sound.filter(Boolean).length +
      roster.ambassadors.filter((a) => a.trim()).length;

    setResult({
      zones: { LO: slots.LO, LI: slots.LI, RI: slots.RI, RO: slots.RO, bottom: slots.bottom, amb: [ambTable] },
      warnings,
      stats: {
        totalMembers: members.length + fixedCount,
        attending: members.length - weekly.absent.length + fixedCount,
        proxies: proxied.size,
        guests: lockedTables.length,
        absentNoProxy: weekly.absent.length,
        visitors: visitorCount,
        bottomRows: Math.max(1, Math.ceil(slots.bottom.length / 2)),
      },
    });
    persist("gw-weekly", { ...weekly, savedAt: Date.now() });
    setSel(null);
    setConfirmArm(false);
    setMsg("");
    setTab("map");
  };

  /* ---------- 座位交換(點選兩個名字,或拖曳;大使席固定不可換) ---------- */
  const swapSeats = (a, b) => {
    setResult((r) => {
      if (!r) return r;
      const zones = JSON.parse(JSON.stringify(r.zones));
      const sa = zones[a.z][a.t].seats[a.s];
      zones[a.z][a.t].seats[a.s] = zones[b.z][b.t].seats[b.s];
      zones[b.z][b.t].seats[b.s] = sa;
      return { ...r, zones };
    });
  };
  const handleSeatClick = (ref) => {
    if (!sel) {
      setSel(ref);
      return;
    }
    if (keyOf(sel.z, sel.t, sel.s) === keyOf(ref.z, ref.t, ref.s)) {
      setSel(null);
      return;
    }
    swapSeats(sel, ref);
    setSel(null);
  };
  const handleDrop = (srcKey, ref) => {
    if (!srcKey) return;
    const src = parseKey(srcKey);
    if (keyOf(src.z, src.t, src.s) !== keyOf(ref.z, ref.t, ref.s)) swapSeats(src, ref);
    setSel(null);
  };

  const Seat = ({ seat, z, t, s }) => {
    const emptyStyle = {
      ...seatStyle("member"),
      background: "#FFFDF7",
      border: "1.5px dashed #C8BC9A",
      boxShadow: "none",
      color: "#C5BA9E",
      fontWeight: 500,
    };
    if (seat.kind === "amb" || seat.kind === "visitor" || viewing) {
      return (
        <div style={{ ...(seat.kind === "empty" ? emptyStyle : seatStyle(seat.kind)), cursor: "default" }}>
          {seat.kind === "empty" ? "空位" : seat.name}
        </div>
      );
    }
    const k = keyOf(z, t, s);
    const isSel = sel && keyOf(sel.z, sel.t, sel.s) === k;
    if (seat.kind === "empty") {
      return (
        <div
          onDragOver={(e) => e.preventDefault()}
          onDrop={(e) => {
            e.preventDefault();
            handleDrop(e.dataTransfer.getData("text/plain"), { z, t, s });
          }}
          onClick={() => handleSeatClick({ z, t, s })}
          style={{
            ...emptyStyle,
            cursor: "pointer",
            outline: isSel ? `3px solid ${C.red}` : "none",
            outlineOffset: 1,
          }}
          title="空位:點選或拖曳名字可移到此"
        >
          空位
        </div>
      );
    }
    const roleTip =
      seat.kind === "committee" ? "委員(離螢幕較遠側)" : seat.kind === "angel" ? "小天使" : "";
    return (
      <div
        draggable
        onDragStart={(e) => e.dataTransfer.setData("text/plain", k)}
        onDragOver={(e) => e.preventDefault()}
        onDrop={(e) => {
          e.preventDefault();
          handleDrop(e.dataTransfer.getData("text/plain"), { z, t, s });
        }}
        onClick={() => handleSeatClick({ z, t, s })}
        style={{
          ...seatStyle(seat.kind),
          cursor: "grab",
          outline: isSel ? `3px solid ${C.red}` : "none",
          outlineOffset: 1,
          transform: isSel ? "scale(1.06)" : "none",
          transition: "transform .12s",
        }}
        title={roleTip || "點選或拖曳可與另一位交換位置"}
      >
        {seat.name}
      </div>
    );
  };

  const Column = ({ z, tables }) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      {tables.map((tb, ti) => (
        <div key={ti} style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {tb.seats.map((st, si) => (
            <Seat key={si} seat={st} z={z} t={ti} s={si} />
          ))}
        </div>
      ))}
    </div>
  );

  /* ---------- 確認存檔(以畫面上目前位置為準,含手動交換) ---------- */
  const confirmWeek = () => {
    if (!result) return;
    if (!confirmArm) {
      setConfirmArm(true);
      return;
    }
    const z = result.zones;
    const all = [...z.LO, ...z.LI, ...z.RI, ...z.RO, ...z.bottom, ...(z.amb || [])];
    const memberKinds = new Set(["member", "committee", "angel"]);
    const groups = all
      .map((t) =>
        t.seats
          .filter((s) => memberKinds.has(s.kind) && s.name !== "(空位)")
          .map((s) => s.name)
      )
      .filter((g) => g.length >= 2);
    const h = { label: weekly.label, groups };
    setHistory(h);
    persist("gw-history", h);
    /* 完整座位表快照,供「儲存紀錄」瀏覽/刪除 */
    const rec = {
      id: Date.now(),
      label: weekly.label,
      zones: JSON.parse(JSON.stringify(z)),
      agenda: [...weekly.agenda],
      stats: result.stats,
      chairRow: roster.chairRow.map((c) => ({ ...c })),
      sound: [...roster.sound],
      week: {
        guests: weekly.guests.filter((g) => g.name && g.name.trim()).map((g) => ({ ...g })),
        proxies: [...weekly.proxies],
        absent: [...weekly.absent],
        memberTotal: result.stats.totalMembers,
      },
    };
    const list = [rec, ...saved].slice(0, 40);
    setSaved(list);
    persist("gw-saved", list);
    const fresh = emptyWeekly();
    setWeekly(fresh);
    persist("gw-weekly", { ...fresh, savedAt: Date.now() });
    setConfirmArm(false);
    setMsg(`已存檔 ${h.label} 分桌紀錄(含手動調整),並加入「儲存紀錄」;下週排位將自動避開本週同桌組合。`);
  };

  /* ---------- 名單增刪(即時儲存,無需另按儲存) ---------- */
  const addMember = () => {
    const name = newMember.trim();
    if (!name) return;
    const exists = [
      ...roster.members,
      ...(roster.committee || []),
      ...roster.chairRow.map((c) => c.name),
      ...roster.sound,
      ...roster.ambassadors,
    ].some((m) => (m || "").trim() === name);
    if (exists) {
      setMsg(`「${name}」已在名單或職務中,未重複加入。`);
      setNewMember("");
      return;
    }
    updateRoster({ ...roster, members: [...roster.members, name] });
    setNewMember("");
    setMsg(`已新增會員「${name}」。`);
  };
  const deleteMember = (name) =>
    askConfirm(`確認刪除會員(${name})嗎?將自輪換名單移除。`, () => {
      updateRoster({ ...roster, members: roster.members.filter((m) => m.trim() !== name) });
      setMsg(`已刪除會員「${name}」。`);
    });

  /* ---------- 屆期交接:一鍵卸任與拖曳指派 ---------- */
  const syncRosterTexts = (r) => updateRoster(r);
  const retireAll = () => {
    askConfirm("確定卸除所有職務嗎?主席排、電音、大使、委員將全部清空,名字回到會員名單。", doRetireAll);
  };
  const doRetireAll = () => {
    const names = [
      ...roster.chairRow.map((c) => c.name.trim()),
      ...roster.sound.map((s) => (s || "").trim()),
      ...roster.ambassadors.map((a) => (a || "").trim()),
      ...(roster.committee || []).map((s) => s.trim()),
    ].filter(Boolean);
    const members = [...new Set([...roster.members.map((s) => s.trim()).filter(Boolean), ...names])];
    syncRosterTexts({
      ...roster,
      members,
      chairRow: roster.chairRow.map((c) => ({ ...c, name: "" })),
      sound: roster.sound.map(() => ""),
      ambassadors: roster.ambassadors.map(() => ""),
      committee: [],
    });
    setMsg(`已卸任所有職務,${names.length} 位回到會員名單。把會員名字拖曳到職務格即可指派下一屆。`);
  };
  const dragName = (e) => {
    const d = e.dataTransfer.getData("text/plain");
    return d && d.indexOf("roster:") === 0 ? d.slice(7) : null;
  };
  const dropProps = (fn) => ({
    onDragOver: (e) => e.preventDefault(),
    onDrop: (e) => {
      e.preventDefault();
      const n = dragName(e);
      if (n) fn(n);
    },
  });
  const assignTo = (name, rolePatch, displaced, roleLabel) => {
    let members = roster.members.filter((m) => m.trim() !== name);
    if (displaced && displaced !== name && !members.some((m) => m.trim() === displaced))
      members = [...members, displaced];
    syncRosterTexts({ ...roster, ...rolePatch, members });
    setMsg(
      `已指派「${name}」為${roleLabel}` +
        (displaced && displaced !== name ? `,「${displaced}」回到會員名單。` : "。")
    );
  };
  const releaseTo = (name, rolePatch, roleLabel) => {
    const members = roster.members.some((m) => m.trim() === name)
      ? roster.members
      : [...roster.members, name];
    syncRosterTexts({ ...roster, ...rolePatch, members });
    setMsg(`「${name}」已卸任${roleLabel},回到會員名單。`);
  };
  const dropChair = (i, name) =>
    assignTo(
      name,
      { chairRow: roster.chairRow.map((c, x) => (x === i ? { ...c, name } : c)) },
      roster.chairRow[i].name.trim(),
      roster.chairRow[i].role
    );
  const dropSound = (i, name) =>
    assignTo(
      name,
      { sound: roster.sound.map((n, x) => (x === i ? name : n)) },
      (roster.sound[i] || "").trim(),
      `電音 ${i + 1}`
    );
  const dropAmb = (i, name) =>
    assignTo(
      name,
      { ambassadors: roster.ambassadors.map((n, x) => (x === i ? name : n)) },
      (roster.ambassadors[i] || "").trim(),
      i === 0 ? "大使" : "董顧"
    );
  const dropCommittee = (name) => {
    if ((roster.committee || []).some((c) => c.trim() === name)) return;
    assignTo(name, { committee: [...(roster.committee || []), name] }, "", "委員");
  };
  const unassignChair = (i) => {
    const old = roster.chairRow[i].name.trim();
    if (!old) return;
    releaseTo(old, { chairRow: roster.chairRow.map((c, x) => (x === i ? { ...c, name: "" } : c)) }, roster.chairRow[i].role);
  };
  const unassignSound = (i) => {
    const old = (roster.sound[i] || "").trim();
    if (!old) return;
    releaseTo(old, { sound: roster.sound.map((n, x) => (x === i ? "" : n)) }, `電音 ${i + 1}`);
  };
  const unassignAmb = (i) => {
    const old = (roster.ambassadors[i] || "").trim();
    if (!old) return;
    releaseTo(old, { ambassadors: roster.ambassadors.map((n, x) => (x === i ? "" : n)) }, i === 0 ? "大使" : "董顧");
  };
  const unassignCommittee = (name) =>
    releaseTo(name, { committee: (roster.committee || []).filter((c) => c.trim() !== name) }, "委員");

  /* 任何人輸入即暫存(於自己的瀏覽器);savedAt 供每週三 10:00 過期判斷 */
  const upWeekly = (w) => {
    setWeekly(w);
    persist("gw-weekly", { ...w, savedAt: Date.now() });
  };
  /* 選單名單 = 會員 ∪ 委員,扣除固定席 */
  const fixedNames = new Set(
    [
      ...roster.chairRow.map((c) => c.name.trim()),
      ...roster.sound.map((s) => (s || "").trim()),
      ...roster.ambassadors.map((a) => (a || "").trim()),
    ].filter(Boolean)
  );
  const memberOptions = [
    ...new Set([...roster.members, ...(roster.committee || [])].map((s) => s.trim()).filter(Boolean)),
  ].filter((n) => !fixedNames.has(n));
  const takenAbsent = new Set([...weekly.absent, ...weekly.proxies]);
  const availableOptions = memberOptions.filter((m) => !takenAbsent.has(m));
  const committeeOptions = (roster.committee || []).filter((c) => !takenAbsent.has(c) && !fixedNames.has(c));

  const tabBtn = (id, label) => (
    <button
      onClick={() => {
        const go = () => {
          setTab(id);
          setViewing(null);
        };
        if (id === "week") go();
        else requireAuth(go);
      }}
      style={{
        ...btn(false),
        background: tab === id ? C.red : "transparent",
        border: "none",
        color: tab === id ? "#fff" : C.ink,
        borderRadius: 8,
      }}
    >
      {label}
    </button>
  );

  const legend = (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", fontSize: 13, alignItems: "center" }}>
      {[
        ["會員", C.seat, C.seatBorder],
        ["來賓(必坐中間)", C.guest, C.guestBorder],
        ["代理出席(右側外圍)", C.proxy, C.proxyBorder],
        ["參訪(底排外側)", "#E8E4DA", "#9A917E"],
        ["大使席(固定)", C.blue, C.blueBorder],
      ].map(([t, bg, bd]) => (
        <span key={t} style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 14, height: 14, background: bg, border: `1.5px solid ${bd}`, borderRadius: 3, display: "inline-block" }} />
          {t}
        </span>
      ))}
    </div>
  );

  const bottomRowsOf = (tables) => {
    const rows = [];
    for (let i = 0; i < tables.length; i += 2) rows.push(tables.slice(i, i + 2));
    return rows.length ? rows : [[]];
  };

  /* 座位圖資料來源:瀏覽儲存紀錄時用快照,否則用本週產生結果 */
  const mapView = viewing
    ? viewing
    : result
    ? { label: weekly.label, zones: result.zones, agenda: weekly.agenda, stats: result.stats, chairRow: roster.chairRow, sound: roster.sound }
    : null;

  const safeLabelOf = (label) => (label || "未命名").replace(/[\\/:*?"<>|]/g, "-");
  const downloadPng = (elId, filename) => {
    const el = document.getElementById(elId);
    if (!el) return Promise.resolve();
    if (!window.html2canvas) {
      window.print(); // 圖檔函式庫未載入(離線)時退回列印
      return Promise.resolve();
    }
    const prevTransform = el.style.transform; // 座位圖螢幕縮放不影響下載尺寸
    el.style.transform = "none";
    return window
      .html2canvas(el, {
        backgroundColor: "#ffffff",
        scale: 2,
        width: el.scrollWidth,
        height: el.scrollHeight,
        windowWidth: el.scrollWidth + 60,
      })
      .then(
        (canvas) =>
          new Promise((resolve) => {
            const a = document.createElement("a");
            a.download = filename + ".png";
            a.href = canvas.toDataURL("image/png");
            a.click();
            setTimeout(resolve, 500); // 間隔一下,避免瀏覽器擋多檔連續下載
          })
      )
      .catch(() => {
        window.print();
      })
      .finally(() => {
        el.style.transform = prevTransform;
      });
  };
  /* 一鍵同步下載:座位圖 + 例會細節表單 + 來賓簽到表 + 來賓名牌(共 4 張) */
  const downloadMeetingSet = async () => {
    const lb = safeLabelOf(mapView && mapView.label);
    await downloadPng("seatmap", `長城鈦金名人堂分會座位圖_${lb}`);
    await downloadPng("meeting-detail", `長城鈦金名人堂分會例會資料_${lb}`);
    await downloadPng("sheet-sign", `來賓簽到表_${lb}`);
    await downloadPng("sheet-tent", `來賓名牌_${lb}`);
  };

  /* 三張表資料來源:瀏覽儲存紀錄時用快照,否則用本週輸入 */
  const fixedCount =
    roster.chairRow.filter((c) => c.name.trim()).length +
    roster.sound.filter(Boolean).length +
    roster.ambassadors.filter((a) => a.trim()).length;
  const sheetData =
    viewing && viewing.week
      ? { ...viewing.week, label: viewing.label }
      : {
          label: weekly.label,
          guests: weekly.guests.filter((g) => g.name && g.name.trim()),
          proxies: weekly.proxies,
          absent: weekly.absent,
          memberTotal: memberOptions.length + fixedCount,
        };

  return (
    <div style={{ fontFamily: FONT, background: C.paper, minHeight: "100vh", color: C.ink }}>
      <style>{`
        @media print { .no-print{display:none!important} body{background:#fff} }
        select, input, textarea { outline-color:${C.red}; }
        button:focus-visible { outline:2px solid ${C.red}; outline-offset:2px; }
      `}</style>

      {/* 頁首 */}
      <div className="no-print" style={{ background: "#fff", borderBottom: `3px solid ${C.red}`, padding: "14px 20px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 900, letterSpacing: 2 }}>長城鈦金名人堂分會・例會排位系統</div>
          <div style={{ fontSize: 12.5, color: "#7A6E5A", marginTop: 2 }}>
            {history ? `已存上週(${history.label})分桌紀錄,排位自動避開` : "尚無歷史紀錄,第一次排位為隨機分桌"}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginLeft: "auto" }}>
          {tabBtn("week", "① 本週輸入")}
          {tabBtn("map", "② 座位圖與表單")}
          {tabBtn("saved", "儲存紀錄")}
          {tabBtn("roster", "名單管理")}
          {authed && (
            <button style={{ ...btn(false), padding: "7px 12px", fontSize: 13 }} onClick={logout}>
              登出
            </button>
          )}
        </div>
      </div>

      {msg && (
        <div className="no-print" style={{ margin: "14px 20px 0", padding: "10px 14px", background: "#E8F3E4", border: `1.5px solid ${C.proxyBorder}`, borderRadius: 8, fontSize: 14.5 }}>
          {msg}
        </div>
      )}

      {/* ===== 本週輸入 ===== */}
      {tab === "week" && (
        <div className="no-print" style={{ padding: 20, maxWidth: 820 }}>
          <div style={{ marginBottom: 18 }}>
            <label style={{ fontWeight: 800, fontSize: 15 }}>例會日期(民國)</label>
            <div>
              <input
                style={{ ...inputStyle, marginTop: 6, width: 180 }}
                value={weekly.label}
                onChange={(e) => upWeekly({ ...weekly, label: e.target.value })}
              />
            </div>
          </div>

          {/* 來賓 */}
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4 }}>
              來賓資料
              <span style={{ fontWeight: 400, fontSize: 13, color: "#7A6E5A", marginLeft: 8 }}>
                姓名/行業別/邀請人等會帶入「② 座位圖與表單」的簽到表與名牌;委員與小天使不指定則自動指派
              </span>
            </div>
            {weekly.guests.map((g, i) => {
              const setG = (patch) => {
                const gs = [...weekly.guests];
                gs[i] = { ...g, ...patch };
                upWeekly({ ...weekly, guests: gs });
              };
              return (
                <div key={i} style={{ border: `1.5px solid ${C.guestBorder}`, background: "#fff", borderRadius: 8, padding: "10px 12px", marginTop: 10 }}>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                    <input
                      style={{ ...inputStyle, width: 120, background: C.guest }}
                      placeholder="來賓姓名"
                      value={g.name}
                      onChange={(e) => setG({ name: e.target.value })}
                    />
                    <input
                      style={{ ...inputStyle, width: 170 }}
                      placeholder="行業別"
                      value={g.industry || ""}
                      onChange={(e) => setG({ industry: e.target.value })}
                    />
                    <input
                      style={{ ...inputStyle, width: 110 }}
                      placeholder="邀請人"
                      value={g.inviter || ""}
                      onChange={(e) => setG({ inviter: e.target.value })}
                    />
                    <button
                      style={{ ...btn(false), padding: "6px 12px", marginLeft: "auto" }}
                      onClick={() => upWeekly({ ...weekly, guests: weekly.guests.filter((_, x) => x !== i) })}
                    >
                      刪除
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 8 }}>
                    <input
                      style={{ ...inputStyle, width: 140 }}
                      placeholder="手機號碼"
                      value={g.phone || ""}
                      onChange={(e) => setG({ phone: e.target.value })}
                    />
                    <input
                      style={{ ...inputStyle, width: 210 }}
                      placeholder="E-mail"
                      value={g.email || ""}
                      onChange={(e) => setG({ email: e.target.value })}
                    />
                    <select
                      style={{ ...inputStyle, width: 168, background: C.yellow }}
                      value={g.committee || ""}
                      onChange={(e) => setG({ committee: e.target.value })}
                    >
                      <option value="">委員(自動指派)</option>
                      {committeeOptions.map((m) => (
                        <option key={m} value={m}>{m}</option>
                      ))}
                    </select>
                    <select
                      style={{ ...inputStyle, width: 168, background: C.yellow }}
                      value={g.angel || ""}
                      onChange={(e) => setG({ angel: e.target.value })}
                    >
                      <option value="">小天使(自動指派)</option>
                      {availableOptions.map((m) => (
                        <option key={m} value={m}>{m}</option>
                      ))}
                    </select>
                  </div>
                </div>
              );
            })}
            <button
              style={{ ...btn(false), marginTop: 10 }}
              onClick={() =>
                upWeekly({
                  ...weekly,
                  guests: [...weekly.guests, { name: "", industry: "", phone: "", email: "", inviter: "", committee: "", angel: "" }],
                })
              }
            >
              ＋ 新增來賓
            </button>
          </div>

          {/* 代理出席 */}
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4 }}>
              本週代理人:{weekly.proxies.length} 位
              <span style={{ fontWeight: 400, fontSize: 13, color: "#7A6E5A", marginLeft: 8 }}>
                選擇「由代理出席」的會員,座位以綠色顯示、固定右側外圍
              </span>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 6 }}>
              <select
                style={{ ...inputStyle, width: 190 }}
                value=""
                onChange={(e) => {
                  if (e.target.value)
                    upWeekly({ ...weekly, proxies: [...weekly.proxies, e.target.value] });
                }}
              >
                <option value="">＋ 新增代理出席的會員</option>
                {memberOptions
                  .filter((m) => !takenAbsent.has(m))
                  .map((m) => (
                    <option key={m} value={m}>{m}</option>
                  ))}
              </select>
              {weekly.proxies.map((m) => (
                <span
                  key={m}
                  style={{ background: C.proxy, border: `1.5px solid ${C.proxyBorder}`, borderRadius: 20, padding: "5px 12px", fontSize: 14, display: "inline-flex", gap: 6, alignItems: "center" }}
                >
                  {m}
                  <button
                    style={{ border: "none", background: "none", cursor: "pointer", fontWeight: 900, color: C.red, fontSize: 14 }}
                    onClick={() => upWeekly({ ...weekly, proxies: weekly.proxies.filter((x) => x !== m) })}
                  >
                    ✕
                  </button>
                </span>
              ))}
            </div>
          </div>

          {/* 缺席 */}
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4 }}>請假/缺席(無代理)</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginTop: 6 }}>
              <select
                style={{ ...inputStyle, width: 170 }}
                value=""
                onChange={(e) => {
                  if (e.target.value)
                    upWeekly({ ...weekly, absent: [...weekly.absent, e.target.value] });
                }}
              >
                <option value="">＋ 新增缺席會員</option>
                {memberOptions
                  .filter((m) => !takenAbsent.has(m))
                  .map((m) => (
                    <option key={m} value={m}>{m}</option>
                  ))}
              </select>
              {weekly.absent.map((m) => (
                <span
                  key={m}
                  style={{ background: "#EFE7D2", border: `1.5px solid ${C.seatBorder}`, borderRadius: 20, padding: "5px 12px", fontSize: 14, display: "inline-flex", gap: 6, alignItems: "center" }}
                >
                  {m}
                  <button
                    style={{ border: "none", background: "none", cursor: "pointer", fontWeight: 900, color: C.red, fontSize: 14 }}
                    onClick={() => upWeekly({ ...weekly, absent: weekly.absent.filter((x) => x !== m) })}
                  >
                    ✕
                  </button>
                </span>
              ))}
            </div>
          </div>

          {/* 分會參訪 */}
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4 }}>
              分會參訪人數
              <span style={{ fontWeight: 400, fontSize: 13, color: "#7A6E5A", marginLeft: 8 }}>
                不用填名字;座位表於底排以「參訪」標示,會員與來賓優先內側排,底排含參訪最多 3 排
              </span>
            </div>

              </select>
              <button
                style={{ ...btn(false), padding: "6px 12px" }}
                onClick={() =>
                  updateRoster({ ...roster, mentorPairs: roster.mentorPairs.filter((_, x) => x !== i) })
                }
              >
                刪除
              </button>
            </div>
          ))}
          <button
            style={{ ...btn(false), marginTop: 10, marginBottom: 22 }}
            onClick={() =>
              updateRoster({ ...roster, mentorPairs: [...(roster.mentorPairs || []), { newbie: "", mentor: "" }] })
            }
          >
            ＋ 新增綁定
          </button>

          <div style={{ marginTop: 14, fontSize: 13, color: "#7A6E5A", lineHeight: 1.8 }}>
            名單增刪與職務指派皆即時儲存,無需另按儲存。新會員以上方「＋ 新增會員」加入;
            會員離會點名字籤上的 ✕ 刪除;委員以拖曳加入、點 ✕ 卸任回會員名單。
          </div>
        </div>
      )}

      {/* ===== 頁尾 ===== */}
      <div className="no-print" style={{ textAlign: "center", padding: "26px 0 18px", fontSize: 13, color: "#7A6E5A" }}>
        2026 Powered by 張婕
      </div>

      {/* ===== 確認對話框 ===== */}
      {confirmDlg && (
        <div className="no-print" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div style={{ background: "#fff", borderRadius: 10, padding: "22px 26px", maxWidth: 380, margin: 16, boxShadow: "0 8px 30px rgba(0,0,0,.3)" }}>
            <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.7, marginBottom: 18 }}>{confirmDlg.message}</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button style={btn(false)} onClick={() => setConfirmDlg(null)}>取消</button>
              <button
                style={btn(true)}
                onClick={() => {
                  const f = confirmDlg.onConfirm;
                  setConfirmDlg(null);
                  f();
                }}
              >
                確定
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ===== 管理員登入對話框 ===== */}
      {loginDlg && (
        <div className="no-print" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div style={{ background: "#fff", borderRadius: 10, padding: "24px 28px", width: 300, margin: 16, boxShadow: "0 8px 30px rgba(0,0,0,.3)" }}>
            <div style={{ fontSize: 17, fontWeight: 800, marginBottom: 6 }}>管理員登入</div>
            <div style={{ fontSize: 13, color: "#7A6E5A", marginBottom: 14 }}>
              此功能僅限管理員;任何人皆可在「① 本週輸入」協助填資料。
            </div>
            <input
              style={{ ...inputStyle, width: "100%", boxSizing: "border-box", marginBottom: 8 }}
              placeholder="帳號"
              value={loginUser}
              onChange={(e) => setLoginUser(e.target.value)}
            />
            <input
              style={{ ...inputStyle, width: "100%", boxSizing: "border-box" }}
              type="password"
              placeholder="密碼"
              value={loginPass}
              onChange={(e) => setLoginPass(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter") tryLogin();
              }}
            />
            {loginErr && <div style={{ color: C.red, fontSize: 13, marginTop: 8 }}>{loginErr}</div>}
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 16 }}>
              <button style={btn(false)} onClick={() => setLoginDlg(null)}>取消</button>
              <button style={btn(true)} onClick={tryLogin}>登入</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
